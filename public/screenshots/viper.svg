<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a1c1a"/>
      <stop offset="100%" stop-color="#252825"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="360" fill="url(#bg)"/>

  <!-- Border frame -->
  <rect x="28" y="22" width="1224" height="316" fill="none" stroke="#FAF9F6" stroke-width="0.45" opacity="0.18"/>

  <!-- Inner corner accents — top-left -->
  <line x1="28"  y1="54"  x2="28"  y2="22"  stroke="#d4a96a" stroke-width="1" opacity="0.55"/>
  <line x1="28"  y1="22"  x2="60"  y2="22"  stroke="#d4a96a" stroke-width="1" opacity="0.55"/>
  <!-- top-right -->
  <line x1="1252" y1="22"  x2="1220" y2="22"  stroke="#d4a96a" stroke-width="1" opacity="0.55"/>
  <line x1="1252" y1="22"  x2="1252" y2="54"  stroke="#d4a96a" stroke-width="1" opacity="0.55"/>
  <!-- bottom-left -->
  <line x1="28"  y1="306" x2="28"  y2="338" stroke="#d4a96a" stroke-width="1" opacity="0.55"/>
  <line x1="28"  y1="338" x2="60"  y2="338" stroke="#d4a96a" stroke-width="1" opacity="0.55"/>
  <!-- bottom-right -->
  <line x1="1252" y1="338" x2="1220" y2="338" stroke="#d4a96a" stroke-width="1" opacity="0.55"/>
  <line x1="1252" y1="306" x2="1252" y2="338" stroke="#d4a96a" stroke-width="1" opacity="0.55"/>

  <!-- V icon — centered -->
  <g transform="translate(640, 104)">
    <path d="M-40,0 L0,78 L40,0"  stroke="#FAF9F6" stroke-width="1.4" fill="none" opacity="0.92"/>
    <path d="M-22,0 L18,78 L58,0" stroke="#FAF9F6" stroke-width="1.4" fill="none" opacity="0.32"/>
    <line x1="-52" y1="0" x2="-43" y2="0" stroke="#FAF9F6" stroke-width="0.9" opacity="0.92"/>
    <line x1="-30" y1="0" x2="-24" y2="0" stroke="#FAF9F6" stroke-width="0.9" opacity="0.32"/>
    <line x1="36"  y1="0" x2="45"  y2="0" stroke="#FAF9F6" stroke-width="0.9" opacity="0.92"/>
    <line x1="54"  y1="0" x2="62"  y2="0" stroke="#FAF9F6" stroke-width="0.9" opacity="0.32"/>
  </g>

  <!-- VIPER -->
  <text
    x="640" y="234"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="70"
    fill="#FAF9F6"
    text-anchor="middle"
    letter-spacing="28">VIPER</text>

  <!-- separator -->
  <line x1="566" y1="254" x2="714" y2="254" stroke="#FAF9F6" stroke-width="0.45" opacity="0.28"/>

  <!-- MILANO -->
  <text
    x="640" y="280"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10.5"
    fill="#FAF9F6"
    text-anchor="middle"
    letter-spacing="12"
    opacity="0.52">MILANO</text>

  <!-- Gold tagline -->
  <text
    x="640" y="318"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11.5"
    font-style="italic"
    fill="#d4a96a"
    text-anchor="middle"
    letter-spacing="1.5"
    opacity="0.78">Alfaiataria italiana com alma feminina</text>
</svg>
