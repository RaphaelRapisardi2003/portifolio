name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via SSH (rsync)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh

          # Escreve a chave privada removendo \r do Windows
          printf '%s' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          echo "" >> ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Verifica se a chave é válida
          echo "=== Verificando chave SSH ==="
          ssh-keygen -l -f ~/.ssh/deploy_key

          # Adiciona host ao known_hosts
          echo "=== Adicionando host ao known_hosts ==="
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>&1
          echo "known_hosts entries: $(wc -l < ~/.ssh/known_hosts)"

          # Testa conexão SSH antes do rsync
          echo "=== Testando conexão SSH ==="
          ssh -i ~/.ssh/deploy_key \
              -p "$SSH_PORT" \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              -v \
              "$SSH_USER@$SSH_HOST" "echo SSH_OK" 2>&1 | tail -30

          # Deploy com rsync
          echo "=== Iniciando rsync ==="
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            dist/ \
            "$SSH_USER@$SSH_HOST:public_html/"
          echo "=== Deploy via rsync concluído! ==="
