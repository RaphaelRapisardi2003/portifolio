name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: List dist contents (debug)
        run: ls -la dist/ && ls -la dist/assets/

      - name: Deploy via FTP
        timeout-minutes: 5
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          lftp -u "$FTP_USER,$FTP_PASSWORD" "ftp://$FTP_HOST" -e "set ssl:verify-certificate no; set ftp:passive-mode yes; set net:timeout 20; mirror --reverse --delete --verbose --no-perms dist/ public_html/; quit"
